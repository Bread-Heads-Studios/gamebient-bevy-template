<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gamebient Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            color: #00e5ff;
        }

        /* --- Game container + canvas --- */
        #game-container {
            position: fixed; inset: 0;
            z-index: 0;
            /* Center the fixed-size canvas so its transform-scaled result is
               letterboxed within the viewport. */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* The canvas LAYOUT box is pinned to 1280×720 px. This is deliberate and
           load-bearing: winit's web backend runs a ResizeObserver on the canvas
           and reports its layout-box size back to Bevy, which sets the render
           backbuffer to match (bevy_winit react_to_resize). If we sized the
           canvas to the viewport (e.g. width: 100vw) the backbuffer would track
           the element and render full-resolution — exactly the fill-rate cost we
           are eliminating. scale_factor_override alone does NOT prevent this.
           So we keep the layout box fixed (→ backbuffer stays 1280×720) and scale
           the canvas *visually* with a CSS transform, which does not affect the
           layout box the ResizeObserver measures. --game-scale is the contain
           factor computed in JS (see the fit() handler below); it only touches a
           CSS variable, never the window resolution. !important defeats any inline
           width/height winit may write on the element. */
        #game {
            width: 1280px !important;
            height: 720px !important;
            /* The container is a flex box, and a flex item's default
               flex-shrink: 1 overrides the specified width during layout on
               viewports narrower than 1280px — squeezing the layout box to a
               portrait sliver that the ResizeObserver then reports as the
               window size. flex: none exempts the canvas from flex sizing so
               the 1280×720 box holds at every viewport size. */
            flex: none;
            transform: scale(var(--game-scale, 1));
            transform-origin: center center;
            display: block;
            outline: none;
        }

        /* --- Loading overlay --- */
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            background: #0a0a0f;
            transition: opacity 0.6s ease-out;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h1 {
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: bold;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-align: center;
            padding: 0 1rem;
        }
        #loading-bar-track {
            width: 300px; height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00e5ff, #7b2fff);
            transition: width 0.3s ease;
        }
        #loading-status {
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* --- Error overlay --- */
        #error {
            position: fixed; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200;
            background: #0a0a0f;
            padding: 2rem;
            text-align: center;
        }
        #error h2 { color: #ff3366; font-size: 1.5rem; margin-bottom: 1rem; }
        #error p { max-width: 500px; line-height: 1.6; opacity: 0.8; }

        /* --- Click-to-start overlay (audio unlock) --- */
        #audio-unlock {
            position: fixed; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 150;
            background: #0a0a0f;
            cursor: pointer;
        }
        #audio-unlock p {
            font-size: clamp(1rem, 4vw, 1.3rem);
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px #00e5ff;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Pre-created canvas inside a fixed container. Bevy targets #game via
         Window { canvas: Some("#game"), fit_canvas_to_parent: false }. -->
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>

    <div id="loading">
        <h1>Gamebient Game</h1>
        <div id="loading-bar-track"><div id="loading-bar"></div></div>
        <div id="loading-status">Initializing...</div>
    </div>

    <div id="error">
        <h2>ERROR</h2>
        <p id="error-msg"></p>
    </div>

    <div id="audio-unlock">
        <p>Click to Start</p>
    </div>

    <!-- Suppress wasm-bindgen control-flow exceptions globally.
         Must be a regular script (not module) so it registers before WASM loads. -->
    <script>
        // Letterbox fit: scale the fixed 1280×720 canvas up to fill the viewport
        // while preserving 16:9. Sets ONLY the --game-scale CSS variable (a visual
        // transform); it never touches the window resolution, so the render
        // backbuffer stays pinned at 1280×720. See the #game CSS comment.
        (function () {
            var fit = function () {
                var s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                document.documentElement.style.setProperty('--game-scale', String(s));
            };
            window.addEventListener('resize', fit);
            fit();
        })();

        // Listen for virtual controller messages from parent iframe wrapper
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'keyEvent') {
                var evt = new KeyboardEvent(e.data.eventType, {
                    key: e.data.key,
                    code: e.data.code,
                    bubbles: true,
                    cancelable: true,
                });
                window.dispatchEvent(evt);
                var canvas = document.getElementById('game');
                if (canvas) canvas.dispatchEvent(evt);
            }
        });

        function isWasmNoise(msg) {
            return typeof msg === 'string' && (
                msg.includes('Using exceptions for control flow') ||
                msg.includes('AudioContext was not allowed to start') ||
                msg.includes('unwind') ||
                msg.includes('RuntimeError: unreachable')
            );
        }
        window.addEventListener('error', function(e) {
            if (isWasmNoise(e.message)) { e.preventDefault(); return; }
        });
        window.addEventListener('unhandledrejection', function(e) {
            if (isWasmNoise(e.reason?.message)) { e.preventDefault(); return; }
        });
    </script>

    <script type="module">
        const loadingBar = document.getElementById('loading-bar');
        const loadingStatus = document.getElementById('loading-status');
        const loadingOverlay = document.getElementById('loading');
        const errorOverlay = document.getElementById('error');
        const errorMsg = document.getElementById('error-msg');
        const audioUnlock = document.getElementById('audio-unlock');
        const gameCanvas = document.getElementById('game');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorOverlay.style.display = 'flex';
            loadingOverlay.style.display = 'none';
        }

        function setProgress(pct, status) {
            loadingBar.style.width = pct + '%';
            if (status) loadingStatus.textContent = status;
        }

        // Check WebGL2 support. Probe on a throwaway canvas, never #game: a
        // canvas gets exactly one context whose attributes are fixed by the
        // FIRST getContext call. Touching #game here would lock in default
        // attributes (MSAA, alpha) and silently override wgpu's later request.
        try {
            const gl = document.createElement('canvas').getContext('webgl2');
            if (!gl) throw new Error();
        } catch {
            showError(
                'Your browser does not support WebGL2, which is required to run Gamebient Game. ' +
                'Please try a recent version of Chrome, Firefox, or Edge.'
            );
            throw new Error('WebGL2 not supported');
        }

        setProgress(10, 'Loading WASM module...');

        // --- Audio unlock strategy ---
        // Browsers block AudioContext until a user gesture (click/tap).
        // Bevy creates AudioContext lazily during its game loop (not during init),
        // so we patch the constructor to track ALL contexts and resume them on click.
        const OrigAudioContext = window.AudioContext || window.webkitAudioContext;
        const trackedContexts = [];
        let userHasInteracted = false;

        if (OrigAudioContext) {
            const Patched = function(...args) {
                const ctx = new OrigAudioContext(...args);
                trackedContexts.push(ctx);
                if (userHasInteracted && ctx.state === 'suspended') {
                    ctx.resume();
                }
                return ctx;
            };
            Patched.prototype = OrigAudioContext.prototype;
            Object.defineProperty(Patched, 'name', { value: 'AudioContext' });
            window.AudioContext = Patched;
            if (window.webkitAudioContext) window.webkitAudioContext = Patched;
        }

        const { default: init } = await import('./gamebient-game.js');

        // Prefer the brotli-compressed wasm when the server actually serves
        // it with Content-Encoding: br (production). Falls back transparently
        // for local dev (python3 -m http.server) where the .br file either
        // doesn't exist or lacks the header.
        let wasmUrl;
        try {
            const probe = await fetch('./gamebient-game_bg.wasm.br', { method: 'HEAD' });
            if (probe.ok && (probe.headers.get('content-encoding') || '').toLowerCase() === 'br') {
                wasmUrl = './gamebient-game_bg.wasm.br';
            }
        } catch {}

        // Prefetch and compile the wasm bytes NOW (behind the progress bar) so
        // the network cost is paid before the user clicks — the engine start is
        // deferred to the unlock click so that the studio-logo screen plays only
        // after the user has seen "Click to Start" and interacted.
        let wasmModule;
        try {
            setProgress(30, 'Downloading game...');
            const wasmResponse = await fetch(wasmUrl || './gamebient-game_bg.wasm');
            if (!wasmResponse.ok) {
                throw new Error('HTTP ' + wasmResponse.status);
            }
            setProgress(60, 'Compiling...');
            wasmModule = await WebAssembly.compile(await wasmResponse.arrayBuffer());
            setProgress(100, 'Ready');
        } catch (e) {
            showError('Failed to download game: ' + (e?.message || e));
            throw e;
        }

        // Show click-to-start. The engine (init) runs only after the click so
        // the studio-logo screen timer begins when the user is actually watching.
        loadingOverlay.classList.add('hidden');
        audioUnlock.style.display = 'flex';

        let started = false;
        const unlock = async () => {
            // Guard against re-entry: set flag synchronously before any await.
            if (started) return;
            started = true;

            // Remove listeners immediately (synchronous) so no second invocation
            // can slip in while the async init is running.
            document.removeEventListener('click', unlock);
            document.removeEventListener('touchend', unlock);
            document.removeEventListener('keydown', unlock);

            userHasInteracted = true;
            trackedContexts.forEach(ctx => {
                if (ctx.state === 'suspended') ctx.resume();
            });
            audioUnlock.style.display = 'none';
            gameCanvas.focus();

            // Start the Bevy engine now — studio-logo timer begins here.
            try {
                await init({ module_or_path: wasmModule });
            } catch (e) {
                // wasm-bindgen uses exceptions for control flow — not a real error
                if (e?.message?.includes('Using exceptions for control flow')) {
                    console.debug('[wasm-bindgen] Ignoring control-flow exception');
                } else {
                    showError('Failed to start: ' + e.message);
                    throw e;
                }
            }
        };
        document.addEventListener('click', unlock);
        document.addEventListener('touchend', unlock);
        document.addEventListener('keydown', unlock);
    </script>
</body>
</html>
